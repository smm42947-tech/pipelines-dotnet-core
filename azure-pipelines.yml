trigger:
- main

pool:
  vmImage: 'windows-latest'

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

# ✅ Restore only the selected project
- script: dotnet restore "examples/dotnetcoreapp/dotnetcoreapp.csproj"
  displayName: 'Restore packages'

# ✅ Build selected project
- script: dotnet build "examples/dotnetcoreapp/dotnetcoreapp.csproj" --configuration Release --no-restore
  displayName: 'Build'

# ✅ Test (if the selected project has tests; otherwise skip)
- script: dotnet test --configuration Release
  displayName: 'Test'

# ✅ Publish artifacts
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'examples/dotnetcoreapp/bin/Release'
    ArtifactName: 'drop'
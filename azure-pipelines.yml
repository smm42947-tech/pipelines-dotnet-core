trigger:
- main

pool:
  vmImage: 'windows-latest'

steps:
- task: UseDotNet@2
  displayName: "Install .NET SDK"
  inputs:
    version: '7.x'   # or 6.x depending on your project

# ✅ Restore using csproj instead of .sln
- script: dotnet restore <path-to-your-csproj>
  displayName: "Restore NuGet Packages"

# ✅ Build using csproj
- script: dotnet build <path-to-your-csproj> -c Release --no-restore
  displayName: "Build Project"

# ✅ Run tests (optional)
- script: dotnet test <path-to-your-test-csproj> -c Release --no-build
  displayName: "Run Tests"